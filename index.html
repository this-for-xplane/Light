<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Switch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { transition: none !important; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: -apple-system, sans-serif; }
        
        .viewport {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
        }

        .switch-plate {
            width: 140px;
            height: 230px;
            background: #eee;
            border-radius: 14px;
            border: 4px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .switch-button {
            width: 100px;
            height: 170px;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ddd;
        }

        .switch-off .switch-button {
            background: linear-gradient(to bottom, #fff 0%, #d5d5d5 100%);
            box-shadow: 0 10px 0 #bbb;
            transform: translateY(-5px);
        }

        .switch-on .switch-button {
            background: linear-gradient(to top, #fff 0%, #d5d5d5 100%);
            box-shadow: 0 -10px 0 #bbb;
            transform: translateY(5px);
        }

        .circle-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }
    </style>
</head>
<body id="main-body">

    <div class="viewport">
        <div class="absolute top-20 w-full text-center px-6">
            <h1 id="actor-text" class="text-zinc-500 font-black text-2xl italic uppercase tracking-tighter">Ready</h1>
        </div>

        <div class="control-row">
            <div onclick="window.open('https://toss.me/temp')" class="circle-btn bg-blue-600 text-white font-serif italic">D</div>
            
            <div id="switch-container" class="switch-plate switch-off">
                <div id="actual-btn" class="switch-button"></div>
            </div>

            <div id="settings-btn" class="circle-btn bg-white text-black border-2 border-black">SET</div>
        </div>

        <div class="absolute bottom-12 flex flex-col items-center gap-6">
            <div id="id-editor" class="flex flex-col items-center cursor-pointer">
                <div id="id-display-box" class="flex items-center gap-2 opacity-60">
                    <span id="current-id" class="text-[11px] font-black tracking-[0.3em] text-zinc-400 uppercase">ID: LOADING</span>
                </div>
                <input id="id-input" type="text" maxlength="8" class="hidden bg-transparent border-b-2 border-orange-500 text-2xl font-black text-center outline-none text-orange-600 uppercase">
            </div>

            <div id="live-indicator" class="flex items-center gap-2.5 bg-black/80 px-5 py-2 rounded-full border border-zinc-700">
                <span id="dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                <span id="live-count" class="text-[11px] font-black text-white uppercase tracking-widest">Offline</span>
            </div>
        </div>
    </div>

    <div id="settings-menu" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-md px-8">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm border-4 border-black shadow-[10px_10px_0px_#000]">
            <h2 class="text-3xl font-black mb-8 uppercase italic border-b-8 border-black pb-2">Settings</h2>
            <div class="space-y-8">
                <div class="flex justify-between items-center">
                    <span class="font-black text-lg italic">SOUND FX</span>
                    <button id="toggle-sfx" class="w-14 h-7 bg-black rounded-full relative p-1">
                        <div id="sfx-knob" class="w-5 h-5 bg-white rounded-full transition-all"></div>
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-black text-lg italic">HAPTIC</span>
                    <button id="toggle-haptic" class="w-14 h-7 bg-black rounded-full relative p-1">
                        <div id="haptic-knob" class="w-5 h-5 bg-white rounded-full transition-all"></div>
                    </button>
                </div>
            </div>
            <button id="close-settings" class="mt-12 w-full py-4 bg-black text-white text-xl font-black uppercase tracking-tighter active:bg-zinc-800">Apply & Close</button>
        </div>
    </div>

    <script>
        /**
         * [보안 팁] 깃허브 공개 시 키를 숨기는 방법:
         * 1. 아래 변수들은 Vercel의 Environment Variables 기능을 사용하거나
         * 2. 공개 레포지토리라면 그냥 적으셔도 무방합니다 (Supabase Anon Key는 공개용입니다).
         * 3. RLS 설정을 통해 DB를 보호하는 것이 훨씬 중요합니다.
         */
        const SUPABASE_URL = "https://ixjvidxvgveisbgdvjkr.supabase.co"; 
        const SUPABASE_KEY = "발급받은_아논키를_여기에_넣으세요"; 
        
        let supabaseClient = null;
        if(SUPABASE_URL && SUPABASE_KEY.length > 20) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        let isOn = false;
        let myId = localStorage.getItem('switch-user-id') || `U-${Math.floor(Math.random()*900)+100}`;
        let config = { 
            sfx: localStorage.getItem('cfg-sfx') !== 'false', 
            haptic: localStorage.getItem('cfg-haptic') !== 'false' 
        };

        const body = document.getElementById('main-body');
        const container = document.getElementById('switch-container');
        const actorText = document.getElementById('actor-text');
        const actualBtn = document.getElementById('actual-btn');
        const idDisplay = document.getElementById('current-id');
        const liveIndicator = document.getElementById('live-indicator');
        const liveCountText = document.getElementById('live-count');
        const dot = document.getElementById('dot');

        idDisplay.innerText = `ID: ${myId}`;

        function updateUI(senderId = myId) {
            if (isOn) {
                body.style.backgroundColor = "#FFFFFF";
                container.classList.replace('switch-off', 'switch-on');
                actorText.innerText = `${senderId} ON`;
                actorText.style.color = "#000";
                liveIndicator.className = "flex items-center gap-2.5 bg-zinc-100 px-5 py-2 rounded-full border border-zinc-300";
                liveCountText.style.color = "#000";
            } else {
                body.style.backgroundColor = "#000";
                container.classList.replace('switch-on', 'switch-off');
                actorText.innerText = `${senderId} OFF`;
                actorText.style.color = "#444";
                liveIndicator.className = "flex items-center gap-2.5 bg-black/80 px-5 py-2 rounded-full border border-zinc-700";
                liveCountText.style.color = "#fff";
            }
            document.getElementById('sfx-knob').style.marginLeft = config.sfx ? '28px' : '0';
            document.getElementById('haptic-knob').style.marginLeft = config.haptic ? '28px' : '0';
        }

        if (supabaseClient) {
            const channel = supabaseClient.channel('global-room', {
                config: { broadcast: { self: false } }
            });

            channel
            .on('broadcast', { event: 'toggle' }, ({ payload }) => {
                isOn = payload.status;
                updateUI(payload.id);
                playFeedback(false); 
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    liveCountText.innerText = "Live Connected";
                    dot.className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                }
            });

            window.broadcastToggle = (status) => {
                channel.send({
                    type: 'broadcast',
                    event: 'toggle',
                    payload: { id: myId, status: status }
                });
            };
        }

        function playFeedback(vibrate = true) {
            if (config.sfx) {
                const sfx = new Audio(isOn 
                    ? "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" 
                    : "https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3");
                sfx.volume = 0.2;
                sfx.play().catch(()=>{});
            }
            if (vibrate && config.haptic && navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        function trigger() {
            isOn = !isOn;
            updateUI(myId);
            playFeedback(true);
            if (window.broadcastToggle) window.broadcastToggle(isOn);
        }

        actualBtn.addEventListener('click', trigger);

        document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-menu').classList.remove('hidden'));
        document.getElementById('toggle-sfx').addEventListener('click', () => { config.sfx = !config.sfx; updateUI(); });
        document.getElementById('toggle-haptic').addEventListener('click', () => { 
            config.haptic = !config.haptic; 
            updateUI(); 
            if(config.haptic && navigator.vibrate) navigator.vibrate(40);
        });
        document.getElementById('close-settings').addEventListener('click', () => {
            localStorage.setItem('cfg-sfx', config.sfx);
            localStorage.setItem('cfg-haptic', config.haptic);
            document.getElementById('settings-menu').classList.add('hidden');
        });

        document.getElementById('id-editor').addEventListener('click', () => {
            document.getElementById('id-display-box').classList.add('hidden');
            const input = document.getElementById('id-input');
            input.classList.remove('hidden');
            input.value = myId;
            input.focus();
        });

        document.getElementById('id-input').addEventListener('blur', (e) => {
            if (e.target.value.trim()) {
                myId = e.target.value.trim().toUpperCase().substring(0,8);
                localStorage.setItem('switch-user-id', myId);
                idDisplay.innerText = `ID: ${myId}`;
            }
            document.getElementById('id-display-box').classList.remove('hidden');
            e.target.classList.add('hidden');
        });

        updateUI();
    </script>
</body>
</html>
