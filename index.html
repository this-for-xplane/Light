<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Switch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { transition: all 0.2s ease-out; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: -apple-system, sans-serif; }
        
        .viewport {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .switch-plate {
            width: 160px;
            height: 260px;
            background: #e5e5e5;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch-well {
            width: 100%;
            height: 100%;
            background: #d1d1d1;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .switch-handle {
            width: 100%;
            height: 70%;
            background: linear-gradient(to bottom, #ffffff, #f0f0f0);
            position: absolute;
            left: 0;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch-off .switch-handle {
            top: 0;
            border-bottom: 8px solid #bcbcbc;
            border-radius: 10px 10px 0 0;
        }

        .switch-on .switch-handle {
            top: 30%;
            border-top: 8px solid #bcbcbc;
            border-radius: 0 0 10px 10px;
        }
    </style>
</head>
<body id="main-body">

    <div class="viewport">
        <div class="absolute top-12 left-0 right-0 flex justify-between px-8">
            <div onclick="window.open('https://toss.me/temp')" class="px-6 py-3 bg-blue-600 text-white font-black text-xs rounded-lg shadow-lg active:scale-95">DONATE</div>
            <div id="settings-btn" class="px-6 py-3 bg-white text-black font-black text-xs rounded-lg shadow-lg active:scale-95 border border-zinc-200">SETTINGS</div>
        </div>

        <div class="mb-12">
            <h1 id="actor-text" class="text-zinc-500 font-black text-2xl italic uppercase tracking-tighter text-center leading-tight">Ready</h1>
        </div>

        <div id="switch-container" class="switch-plate switch-off">
            <div class="switch-well">
                <div id="actual-btn" class="switch-handle"></div>
            </div>
        </div>

        <div class="mt-12 flex flex-col items-center gap-6">
            <div id="id-editor" class="flex items-center gap-2 cursor-pointer">
                <span id="current-id" class="text-xs font-black tracking-widest text-zinc-400 uppercase">ID: LOADING</span>
                <input id="id-input" type="text" maxlength="8" class="hidden bg-transparent border-b border-orange-500 text-sm font-black text-center outline-none text-orange-500 uppercase">
            </div>

            <div id="live-indicator" class="flex items-center gap-2.5 bg-zinc-800/50 px-5 py-2 rounded-full border border-zinc-700">
                <span id="dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                <span id="live-count" class="text-[11px] font-black text-white uppercase tracking-widest italic">Connecting...</span>
            </div>
        </div>
    </div>

    <!-- 설정 레이어 -->
    <div id="settings-menu" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-md px-8">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm border-4 border-black">
            <h2 class="text-2xl font-black mb-8 uppercase italic border-b-4 border-black pb-2">Settings</h2>
            <div class="space-y-8">
                <div class="flex justify-between items-center">
                    <span class="font-black text-sm italic uppercase">Sound FX</span>
                    <button id="toggle-sfx" class="w-12 h-6 bg-black rounded-full relative p-1">
                        <div id="sfx-knob" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-black text-sm italic uppercase">Haptic (Vibrate)</span>
                    <button id="toggle-haptic" class="w-12 h-6 bg-black rounded-full relative p-1">
                        <div id="haptic-knob" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                    </button>
                </div>
            </div>
            <button id="close-settings" class="mt-12 w-full py-4 bg-black text-white text-sm font-black uppercase active:bg-zinc-800">Close</button>
        </div>
    </div>

    <script>
        // Vercel 환경 변수로 치환될 변수 (Build Command 설정 필요)
        const SUPABASE_URL = "VITE_SUPABASE_URL_PLACEHOLDER"; 
        const SUPABASE_KEY = "VITE_SUPABASE_KEY_PLACEHOLDER"; 
        
        let supabaseClient = null;
        if(SUPABASE_URL.startsWith("http")) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        let isOn = false;
        let myId = localStorage.getItem('switch-user-id') || `U-${Math.floor(Math.random()*900)+100}`;
        let config = { 
            sfx: localStorage.getItem('cfg-sfx') !== 'false', 
            haptic: localStorage.getItem('cfg-haptic') !== 'false' 
        };

        const body = document.getElementById('main-body');
        const container = document.getElementById('switch-container');
        const actorText = document.getElementById('actor-text');
        const actualBtn = document.getElementById('actual-btn');
        const idDisplay = document.getElementById('current-id');
        const liveIndicator = document.getElementById('live-indicator');
        const liveCountText = document.getElementById('live-count');
        const dot = document.getElementById('dot');

        idDisplay.innerText = `ID: ${myId}`;

        function updateUI(senderId = myId) {
            if (isOn) {
                body.style.backgroundColor = "#FFFFFF";
                container.classList.replace('switch-off', 'switch-on');
                actorText.innerText = `${senderId}\nTURNED ON`;
                actorText.style.color = "#000";
                liveIndicator.className = "flex items-center gap-2.5 bg-zinc-100 px-5 py-2 rounded-full border border-zinc-300";
                liveCountText.style.color = "#000";
            } else {
                body.style.backgroundColor = "#000";
                container.classList.replace('switch-on', 'switch-off');
                actorText.innerText = `${senderId}\nTURNED OFF`;
                actorText.style.color = "#444";
                liveIndicator.className = "flex items-center gap-2.5 bg-black/80 px-5 py-2 rounded-full border border-zinc-700";
                liveCountText.style.color = "#fff";
            }
            document.getElementById('sfx-knob').style.marginLeft = config.sfx ? '24px' : '0';
            document.getElementById('haptic-knob').style.marginLeft = config.haptic ? '24px' : '0';
        }

        if (supabaseClient) {
            const channel = supabaseClient.channel('global-presence', {
                config: { presence: { key: myId } }
            });

            // Presence 데이터 동기화 (실시간 접속자 수 파악)
            channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const count = Object.keys(state).length;
                liveCountText.innerText = `${count.toLocaleString()} LIVE CONNECTED`;
            })
            // 브로드캐스트 (스위치 상태 동기화)
            .on('broadcast', { event: 'toggle' }, ({ payload }) => {
                isOn = payload.status;
                updateUI(payload.id);
                playFeedback(false); 
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    dot.className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                    // 내 접속 상태 등록
                    await channel.track({ online_at: new Date().toISOString() });
                }
            });

            window.broadcastToggle = (status) => {
                channel.send({
                    type: 'broadcast',
                    event: 'toggle',
                    payload: { id: myId, status: status }
                });
            };
        }

        function playFeedback(vibrateOnly = false) {
            if (config.sfx && !vibrateOnly) {
                const sfx = new Audio(isOn 
                    ? "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" 
                    : "https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3");
                sfx.volume = 0.2;
                sfx.play().catch(()=>{});
            }
            if (config.haptic && navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        function trigger() {
            isOn = !isOn;
            updateUI(myId);
            playFeedback(false);
            if (window.broadcastToggle) window.broadcastToggle(isOn);
        }

        actualBtn.addEventListener('click', trigger);

        document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-menu').classList.remove('hidden'));
        document.getElementById('toggle-sfx').addEventListener('click', () => { config.sfx = !config.sfx; updateUI(); });
        document.getElementById('toggle-haptic').addEventListener('click', () => { 
            config.haptic = !config.haptic; 
            updateUI(); 
            if(config.haptic && navigator.vibrate) navigator.vibrate(40);
        });
        document.getElementById('close-settings').addEventListener('click', () => {
            localStorage.setItem('cfg-sfx', config.sfx);
            localStorage.setItem('cfg-haptic', config.haptic);
            document.getElementById('settings-menu').classList.add('hidden');
        });

        document.getElementById('id-editor').addEventListener('click', () => {
            idDisplay.classList.add('hidden');
            const input = document.getElementById('id-input');
            input.classList.remove('hidden');
            input.value = myId;
            input.focus();
        });

        document.getElementById('id-input').addEventListener('blur', (e) => {
            if (e.target.value.trim()) {
                myId = e.target.value.trim().toUpperCase().substring(0,8);
                localStorage.setItem('switch-user-id', myId);
                idDisplay.innerText = `ID: ${myId}`;
            }
            idDisplay.classList.remove('hidden');
            e.target.classList.add('hidden');
        });

        updateUI();
    </script>
</body>
</html>
